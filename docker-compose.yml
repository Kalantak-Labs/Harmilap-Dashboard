version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: harmilap
      POSTGRES_USER: harmilap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harmilap}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmilap"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://harmilap:${POSTGRES_PASSWORD:-harmilap}@postgres:5432/harmilap
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: '["http://localhost:3000","${FRONTEND_URL:-http://localhost:3000}"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
